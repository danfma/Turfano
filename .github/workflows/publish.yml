# This workflow will build a .NET project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-net

name: .NET

on:
  push:
    branches:
      - "main"
    tags:
      - '*'
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v5
      with:
        fetch-depth: 0

    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: |
          8.0.x
          9.0.x
          10.0.x

    - name: Restore dependencies
      run: dotnet restore DotTerritory.slnx

    - name: Restore tools
      run: dotnet tool restore

    - name: Run tests (TUnit / Microsoft.Testing.Platform)
      run: dotnet run --project tests/DotTerritory.Tests/DotTerritory.Tests.csproj -c Release

    - name: Build, Pack and Publish (on push tag)
      shell: bash
      run: dotnet dotnet-releaser run --force --nuget-token "${{secrets.NUGET_TOKEN}}" --github-token "${{secrets.GITHUB_TOKEN}}" dotnet-releaser.toml
